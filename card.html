<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Design</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #card{
            padding: 20px;
            margin: 80px;
            border: 2px solid black;
            height: 400px;
            width: 300px;
            color: black;
            background-color: aqua;
            transition: ease-in-out;
            
        }
        #card p{
            font-size: 20px;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #card:hover{
            border-radius: 40px;
            background-color: brown;
            color: white;
            font-style: italic;
            

        }
    </style>
</head>
<body>
    <div id="card">
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Corporis perspiciatis officiis similique, iure ipsa, earum, sunt nihil blanditiis fugit recusandae ab fuga. Pariatur quidem autem sint ex voluptates quisquam in.</p>
    </div>
</body>
</html>
