<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sample</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #div1 {
            height: 90vh;
            width: 100%;
            background-image: url(/photo.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }

        #nav {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 40px;

        }

        #nav a {
            text-decoration: none;
            color: rgb(1, 0, 0);
            font-size: 20px;
            font-family: sans-serif;
            font-weight: bold;
        }

        #div2 {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px;

        }

        #div3 {
            height: 300px;
            width: 600px;
            border: 15px solid rgb(118, 3, 3);
            padding: 40px;
        }

        #div3 h1 {
            text-align: center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: 50px;

        }

        #div3 h2 {
            text-align: center;
            color: rgb(206, 227, 11);
            background-color: rgb(170, 42, 10);
            border-radius: 20px;
        }

        #footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;


        }

        #footer button {
            background-color: white;
            color: black;
            border-radius: 10px;
            width: 160px;
            padding: 20px 20px;
            border: 2px solid rgb(159, 10, 10);
            transition: cubic-bezier(0.23, 1, 0.320, 1);
        }

        #footer button:hover {
            background-color: brown;
            color: white;

        }
    </style>
</head>

<body>
    <div id="div1">
        <header>
            <nav id="nav">
                <a href="#">Home</a>
                <a href="#">Profile</a>
                <a href="#">WorkExperience</a>
                <a href="#">Skill</a>
                <a href="#">Interest</a>
                <a href="#">Portfolio</a>
                <a href="#">Contact</a>

            </nav>
        </header>
        <div id="div2">
            <div id="div3">
                <h1>HELLO!<br>I AM LARENS</h1><br>
                <h2>WEB & GRAPHICS DESGINER</h2>
            </div>
        </div>
        <footer>
            <div id="footer">
                <button>DOWNLOAD CV</button>
                <button>HIRE ME</button>

            </div>
        </footer>


    </div>

</body>

</html>
