<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-comerce website</title>
    <style>
        *{
            margin: 0;
            padding:0;
            box-sizing: border-box;
        }
        header{
            display: flex;
            align-items: center;
            justify-content: space-around;
            border: 2px solid black;
            border-radius: 10px;
            background-color: thistle;
            height: 80px;
        }
        #navbar{
           display: flex;
           gap:40px;
        }
        #navbar a{
            font-size: 25px;
            text-decoration: none;
            color: black;
        }
        #logo{
            display: flex;   
            justify-content:flex-end;
            gap:50px;
            height: 50px;

        }
        #container{
            background-image: url(unnamed.png);
            background-size: cover;
            
            height: 90vh;
            width: auto;
           
        }
    </style>
</head>
<body>
    <header>
        <h2>ShopMorden</h2>
        <nav id="navbar">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Products</a>
            <a href="#">Feedback</a>
        </nav>
        <div id="logo">
            <img src="purchase.png" alt="error">
            <img src="profile.png" alt="error">
        </div>
    </header>
    <section>
        <div id="container">

        </div>
    </section>
</body>
</html>
